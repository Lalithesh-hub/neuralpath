[build]
  command = "cd client && npm install && CI= npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA redirect — but EXCLUDE /api so it doesn't swallow backend calls
[[redirects]]
  from   = "/api/*"
  to     = "/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
